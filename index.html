<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Snippets</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: #e2e8f0;
      min-height: 100vh;
    }

    #root { max-width: 900px; margin: 0 auto; padding: 32px 16px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    /* Search + Add bar */
    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-input {
      flex: 1;
      padding: 10px 14px;
      background: #1e1e24;
      border: 1px solid #2d2d36;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: #6366f1; }
    .search-input::placeholder { color: #4b5563; }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-danger  { background: transparent; color: #ef4444; border: 1px solid #ef444430; font-size: 0.8rem; padding: 6px 10px; }
    .btn-danger:hover { background: #ef444415; opacity: 1; }

    /* Modal overlay */
    .overlay {
      position: fixed; inset: 0;
      background: #00000088;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal {
      background: #1a1a22;
      border: 1px solid #2d2d3a;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 18px; color: #f1f5f9; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      background: #111118;
      border: 1px solid #2d2d3a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .field input:focus, .field textarea:focus, .field select:focus { border-color: #6366f1; }

    .field textarea {
      font-family: 'SFMono-Regular', 'Fira Code', 'Menlo', monospace;
      font-size: 0.82rem;
      resize: vertical;
      min-height: 130px;
      line-height: 1.55;
    }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d2d3a; }

    /* Category filter */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #2d2d3a;
      background: transparent;
      color: #94a3b8;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #6366f1; color: #a5b4fc; }
    .filter-btn.active { background: #6366f120; border-color: #6366f1; color: #a5b4fc; }

    /* Snippet grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: #1a1a22;
      border: 1px solid #2d2d3a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: #3d3d52; }

    .card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .card-description {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 3px;
    }

    .card-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #6366f118;
      color: #818cf8;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-code {
      padding: 0 16px;
      font-family: 'SFMono-Regular', 'Fira Code', 'Menlo', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      white-space: pre-wrap;
      line-height: 1.55;
      max-height: 110px;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }

    .card-footer {
      padding: 10px 16px 14px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .copy-btn {
      padding: 7px 14px;
      background: #6366f118;
      border: 1px solid #6366f130;
      color: #818cf8;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: #6366f130; }
    .copy-btn.copied { background: #10b98120; border-color: #10b98140; color: #34d399; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #4b5563;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = 'css_snippets_v1';

const DEFAULT_SNIPPETS = [
  {
    id: 1,
    title: 'Flexbox Center',
    description: 'Center children horizontally & vertically',
    category: 'Layout',
    code: `display: flex;\nalign-items: center;\njustify-content: center;`
  },
  {
    id: 2,
    title: 'Smooth Transition',
    description: 'All-purpose transition shorthand',
    category: 'Animation',
    code: `transition: all 0.2s ease-in-out;`
  },
  {
    id: 3,
    title: 'Text Ellipsis',
    description: 'Truncate overflowing text with …',
    category: 'Typography',
    code: `overflow: hidden;\nwhite-space: nowrap;\ntext-overflow: ellipsis;`
  },
];

const CATEGORIES = ['All', 'Layout', 'Typography', 'Animation', 'Colors', 'Spacing', 'Other'];

function App() {
  const [snippets, setSnippets] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : DEFAULT_SNIPPETS;
    } catch { return DEFAULT_SNIPPETS; }
  });

  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('All');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ title: '', description: '', category: 'Other', code: '' });
  const [copiedId, setCopiedId] = useState(null);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snippets));
  }, [snippets]);

  const openAdd = () => {
    setEditing(null);
    setForm({ title: '', description: '', category: 'Other', code: '' });
    setShowModal(true);
  };

  const openEdit = (s) => {
    setEditing(s.id);
    setForm({ title: s.title, description: s.description, category: s.category, code: s.code });
    setShowModal(true);
  };

  const save = () => {
    if (!form.title.trim() || !form.code.trim()) return;
    if (editing) {
      setSnippets(prev => prev.map(s => s.id === editing ? { ...s, ...form } : s));
    } else {
      setSnippets(prev => [...prev, { id: Date.now(), ...form }]);
    }
    setShowModal(false);
  };

  const remove = (id) => {
    setSnippets(prev => prev.filter(s => s.id !== id));
  };

  const copy = (snippet) => {
    navigator.clipboard.writeText(snippet.code).then(() => {
      setCopiedId(snippet.id);
      setTimeout(() => setCopiedId(null), 1600);
    });
  };

  const visible = snippets.filter(s => {
    const matchCat = filter === 'All' || s.category === filter;
    const q = search.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.description.toLowerCase().includes(q) || s.code.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  return (
    <>
      <div id="root-inner">
        <h1>CSS Snippets</h1>
        <p className="subtitle">Your personal library of reusable CSS codes.</p>

        <div className="top-bar">
          <input
            className="search-input"
            placeholder="Search snippets…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <button className="btn btn-primary" onClick={openAdd}>+ New Snippet</button>
        </div>

        <div className="filters">
          {CATEGORIES.map(c => (
            <button
              key={c}
              className={`filter-btn ${filter === c ? 'active' : ''}`}
              onClick={() => setFilter(c)}
            >{c}</button>
          ))}
        </div>

        {visible.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📭</div>
            <p>{snippets.length === 0 ? 'No snippets yet. Add your first one!' : 'No snippets match your search.'}</p>
          </div>
        ) : (
          <div className="grid">
            {visible.map(s => (
              <div className="card" key={s.id}>
                <div className="card-header">
                  <div>
                    <div className="card-title">{s.title}</div>
                    {s.description && <div className="card-description">{s.description}</div>}
                  </div>
                  <span className="card-tag">{s.category}</span>
                </div>
                <pre className="card-code">{s.code}</pre>
                <div className="card-footer">
                  <button className="btn btn-danger" onClick={() => remove(s.id)}>Delete</button>
                  <button className="btn btn-ghost btn" style={{fontSize:'0.8rem',padding:'6px 10px'}} onClick={() => openEdit(s)}>Edit</button>
                  <button
                    className={`copy-btn ${copiedId === s.id ? 'copied' : ''}`}
                    onClick={() => copy(s)}
                  >
                    {copiedId === s.id ? '✓ Copied!' : 'Copy CSS'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showModal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setShowModal(false)}>
          <div className="modal">
            <h2>{editing ? 'Edit Snippet' : 'New Snippet'}</h2>

            <div className="field">
              <label>Title *</label>
              <input
                placeholder="e.g. Flexbox Center"
                value={form.title}
                onChange={e => setForm(f => ({...f, title: e.target.value}))}
              />
            </div>

            <div className="field">
              <label>Description</label>
              <input
                placeholder="Short description (optional)"
                value={form.description}
                onChange={e => setForm(f => ({...f, description: e.target.value}))}
              />
            </div>

            <div className="field">
              <label>Category</label>
              <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))}>
                {CATEGORIES.filter(c => c !== 'All').map(c => <option key={c}>{c}</option>)}
              </select>
            </div>

            <div className="field">
              <label>CSS Code *</label>
              <textarea
                placeholder="Paste your CSS here…"
                value={form.code}
                onChange={e => setForm(f => ({...f, code: e.target.value}))}
              />
            </div>

            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>
                {editing ? 'Save Changes' : 'Add Snippet'}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
